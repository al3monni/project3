# Project 3 - Bio-inspired AI
# Centralized configuration file

# Neighborhood size
neighborhood: 
  size: 3

# Datasets to use
datasets:
  01-breast-w_lr_F.h5: 
    min: 0.78780484
    max: 0.97012186
  05-credit-a_rf_F.h5:
    min: 0.5204083
    max: 0.8912626
  08-letter-r_knn_F.h5:
    min: 0.038708337
    max: 0.9563333
  triangle:

# Landscape parameters
landscape:
  dataset_name: "accuracies"
  penalty: 0.01
  synthetic:
    n: 32           # for synthetic landscape
    m: 1          # for synthetic landscape
    s: 4            # for synthetic landscape

# Experiment parameters
experiment:
  n_runs: 30              # Number of independent runs
  popsize: 50             # Population size
  generations: 100        # Number of generations
  output_dir: "res"       # Base output directory

# Algorithm parameters
algorithms:
  GA:
    pc: 0.9               # Crossover probability
    pm: -1.0              # Mutation probability (-1 = auto: 1/n_bits)
    # tournament_size: 3    # Tournament selection size

  PSO:
    w: 0.7                # Inertia weight
    c1: 1.5               # Cognitive coefficient
    c2: 1.5               # Social coefficient

  NSGA2:
    pc: 0.9               # Crossover probability
    pm: -1.0              # Mutation probability (-1 = auto: 1/n_bits)
